<!DOCTYPE html>
<html>
<head>
    <title>CarlaOS 🔐</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;

            /* 🌌 Fondo galaxia */
            background: radial-gradient(circle at 20% 30%, #2a2a72, transparent),
                        radial-gradient(circle at 80% 70%, #009ffd, transparent),
                        linear-gradient(135deg, #0f2027, #203a43, #2c5364);

            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* ✨ estrellas */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.08;
            animation: moveStars 60s linear infinite;
            pointer-events: none; /* 🔥 CLAVE */
        }

        @keyframes moveStars {
            from { transform: translate(0,0); }
            to { transform: translate(-200px, -200px); }
        }

        /* ✨ estrellas que parpadean */
        body::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(white 1px, transparent 1px),
                radial-gradient(white 2px, transparent 2px);
            background-size: 80px 80px, 120px 120px;
            opacity: 0.15;
            animation: twinkle 4s infinite alternate;
            pointer-events: none; /* 🔥 CLAVE */
        }

        @keyframes twinkle {
            from { opacity: 0.1; }
            to { opacity: 0.25; }
        }

        /* 🌙 caja login */
        .login-box {
            position: relative;
            z-index: 10; /* 🔥 CLAVE */
            background: rgba(20, 20, 40, 0.75);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            text-align: center;
            width: 320px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            margin-bottom: 5px;
            font-size: 26px;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        /* 🔑 input */
        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            text-align: center;
            font-size: 20px;
            letter-spacing: 6px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        input:focus {
            background: rgba(255,255,255,0.2);
        }

        /* 🚀 botón */
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00c9a7, #92fe9d);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,255,200,0.4);
        }

        /* 💫 detalle */
        .login-box::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
            pointer-events: none;
        }

    </style>
</head>


<body>

<div id="loading-screen" style="
    display:none;
    position:fixed;
    inset:0;
    background:#0f2027;
    color:white;
    z-index:9999;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:20px;
">
    <div class="loader"></div>
    <p style="margin-top:20px;">Cargando tu espacio...</p>
</div>

<div class="login-box">
    <h2>🔐 CarlaOS</h2>
    <p>Acceso</p>

    <form method="POST">
        <input type="password" name="pin" placeholder="••••" required>
        <button type="submit">Entrar</button>
    </form>

    {% if error %}
        <p style="color:#ff6b6b; margin-top:15px;">{{ error }}</p>
    {% endif %}

    {% if success %}
        <p style="color:#92fe9d; margin-top:15px;">Bienvenida ✨</p>
    {% endif %}

</div>

<script>
{% if success %}
    const box = document.querySelector(".login-box");
    const loading = document.getElementById("loading-screen");

    // animación salida login
    box.classList.add("fade-out");

    // mostrar loading suavemente
    setTimeout(() => {
        loading.style.display = "flex";
        loading.classList.add("show");
    }, 400);

    // textos dinámicos
    loading.querySelector("p").innerText = "Preparando tu espacio...";

    setTimeout(() => {
        loading.querySelector("p").innerText = "Cargando datos...";
    }, 1200);

    setTimeout(() => {
        loading.querySelector("p").innerText = "Casi listo...";
    }, 2000);

    // redirección
    setTimeout(() => {
        window.location.href = "/inicio";
    }, 3000);
{% endif %}
</script>

</body>
</html>
